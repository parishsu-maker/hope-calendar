<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOPE GOLF 教練團隊排課行事曆</title>
<style>
/* ── Reset ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:15px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid #d4d0c8;border-radius:8px;outline:none;width:100%;background:#fff;color:#1a1a1a}
input:focus,select:focus,textarea:focus{border-color:#7BAE96;box-shadow:0 0 0 3px rgba(123,174,150,.15)}
textarea{resize:none;height:54px}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#f5f4f0}
.login-card{background:#fff;border-radius:16px;padding:2rem 1.75rem;width:380px;max-width:95vw;border:1px solid #e4e0d8;text-align:center}
.login-card img{height:64px;object-fit:contain;margin-bottom:6px}
.login-sub{font-size:13px;color:#7BAE96;font-weight:500;margin-bottom:1.5rem;letter-spacing:.03em}
.fr{margin-bottom:.85rem;text-align:left}
.fr label{font-size:12px;color:#666;display:block;margin-bottom:4px;font-weight:500}
.btn-primary{width:100%;padding:10px;background:#7BAE96;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;margin-top:.25rem}
.btn-primary:hover{background:#6a9d85}
.demo-row{display:flex;gap:8px;width:380px;max-width:95vw}
.demo-btn{flex:1;padding:9px;font-size:12px;border-radius:8px;border:1px solid #d4d0c8;background:#fff;color:#555}
.demo-btn:hover{background:#f0ede8}
.err{color:#E53935;font-size:12px;margin-top:6px;display:none;text-align:left}

/* ── App shell ── */
.app{display:none;flex-direction:column;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e4e0d8;padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.header-left{display:flex;align-items:center;gap:12px}
.header-left img{height:32px;object-fit:contain}
.header-divider{width:1px;height:20px;background:#e4e0d8}
.header-sub{font-size:12px;color:#7BAE96;font-weight:500;letter-spacing:.02em}
.role-tag{font-size:11px;padding:2px 10px;border-radius:999px;margin-left:6px}
.user-info{display:flex;align-items:center;gap:8px;font-size:13px;color:#666}
.icon-btn{padding:5px 11px;font-size:12px;border-radius:8px;border:1px solid #d4d0c8;background:#fff;color:#666}
.icon-btn:hover{background:#f0ede8}
.main{padding:16px 20px;flex:1;max-width:960px;margin:0 auto;width:100%}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.pill-group{display:flex;gap:4px}
.pill{padding:5px 13px;font-size:12px;border-radius:8px;border:1px solid #d4d0c8;background:transparent;color:#666}
.pill.active{background:#2a2a2a;color:#fff;border-color:#2a2a2a}
.nav-row{display:flex;align-items:center;gap:5px}
.nav-btn{width:30px;height:30px;border:1px solid #d4d0c8;border-radius:8px;background:#fff;color:#666;display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-btn:hover{background:#f0ede8}
.period-label{font-size:14px;font-weight:600;min-width:170px;text-align:center;color:#2a2a2a}
.today-btn{padding:5px 11px;font-size:12px;border-radius:8px;border:1px solid #d4d0c8;background:#fff;color:#666}
.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.fc{padding:4px 11px;font-size:12px;border-radius:999px;border:1.5px solid transparent;cursor:pointer;color:#fff;font-weight:500;opacity:.5;transition:opacity .15s}
.fc.on{opacity:1}
.add-btn{padding:6px 14px;font-size:12px;border-radius:8px;background:#7BAE96;color:#fff;border:none;display:flex;align-items:center;gap:4px}
.add-btn:hover{background:#6a9d85}

/* ── 值班橫幅（黑底） ── */
.duty-bar{background:#2a2a2a;border:1px solid #1a1a1a;border-radius:12px;padding:11px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.duty-bar-label{font-size:13px;font-weight:600;color:#2a2a2a;white-space:nowrap;background:#7BAE96;padding:3px 10px;border-radius:999px}
.duty-section{display:flex;align-items:center;gap:8px}
.duty-section-name{font-size:13px;color:#fff;font-weight:500;white-space:nowrap}
.duty-chip{display:inline-flex;align-items:center;padding:3px 12px;border-radius:999px;font-size:13px;font-weight:600;color:#fff}
.duty-mine{outline:2px solid #fff;outline-offset:2px}
/* ── 休假橫幅 ── */
.leave-bar{background:#C8DCF0;border:1px solid #a8c4e0;border-radius:12px;padding:10px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.leave-bar-label{font-size:13px;font-weight:600;color:#2a4a6a;white-space:nowrap;background:#fff;padding:3px 10px;border-radius:999px;border:1px solid #a8c4e0}
/* 重複排班星期按鈕 */
.dow-btn{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border-radius:999px;border:1.5px solid #d4d0c8;background:#fff;font-size:12px;font-weight:500;color:#666;cursor:pointer;user-select:none}
.dow-btn input{width:auto;accent-color:#7BAE96;display:none}
.dow-btn:has(input:checked){background:#7BAE96;color:#fff;border-color:#7BAE96}
.leave-chip{display:inline-flex;align-items:center;padding:3px 12px;border-radius:999px;font-size:13px;font-weight:600;color:#fff}
.leave-empty{font-size:13px;color:#7a9abf;font-style:italic}
.duty-empty{font-size:13px;color:#555;font-style:italic}
.duty-divider{width:1px;height:20px;background:#444;flex-shrink:0}

/* ── Day list ── */
.day-list{display:flex;flex-direction:column;gap:8px}
.day-card{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #e4e0d8;border-radius:12px;padding:11px 16px;cursor:pointer;transition:background .15s;overflow:hidden}
.day-card:hover{background:#faf9f6}
.day-card.standby{background:#FDECEA;border-color:#E53935}
.day-card.standby .card-title{color:#c0392b}
.day-card.standby .card-meta,.day-card.standby .time-col{color:#c0706a}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;color:#fff}
.card-body{flex:1;min-width:0}
.card-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#2a2a2a}
.card-meta{font-size:11px;color:#888;margin-top:3px;display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.time-col{font-size:12px;font-weight:500;color:#888;text-align:right;white-space:nowrap;flex-shrink:0;min-width:92px}
.loc-tag{font-size:10px;padding:2px 7px;border-radius:999px}
.loc-2f{background:#dceee6;color:#4a7a60}
.loc-b1{background:#dde8f0;color:#4a6a80}
.loc-field{background:#f0e8d8;color:#8a6040}
.loc-none{background:#eeeae4;color:#888}
.loc-standby{background:#fcd4d4;color:#c0392b;font-weight:600}
.loc-pg{background:#e8e0f0;color:#5a3a80}
.seq-badge{font-size:10px;background:#eeeae4;color:#888;padding:1px 7px;border-radius:999px}
.standby-tag{font-size:10px;background:#E53935;color:#fff;padding:2px 7px;border-radius:999px;font-weight:500}
.empty-state{text-align:center;padding:3rem;color:#bbb;font-size:14px}

/* ── Month ── */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e4e0d8;border:1px solid #e4e0d8;border-radius:12px;overflow:hidden}
.mh{background:#f0ede8;padding:6px;font-size:11px;color:#888;text-align:center;font-weight:500}
.mc{background:#fff;padding:6px;min-height:86px}
.mc.om{background:#faf9f6}
.dn{font-size:11px;color:#aaa;margin-bottom:3px}
.dn.tod{background:#2a2a2a;color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.mpill{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:2px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.mmore{font-size:9px;color:#aaa;cursor:pointer}
.m-duty-row{display:flex;gap:2px;margin-bottom:3px;flex-wrap:wrap}
.m-duty-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── Week ── */
.week-wrap{border:1px solid #e4e0d8;border-radius:12px;overflow:hidden;background:#fff}
.week-head-row{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:1px solid #e4e0d8}
.whc{background:#f0ede8;padding:6px 2px;text-align:center}
.wdn{font-size:10px;color:#888}
.wdd{font-size:15px;font-weight:600;color:#2a2a2a;margin-top:2px}
.wdd.tw{background:#2a2a2a;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;margin:2px auto 0}
.week-duty-row{display:grid;grid-template-columns:48px repeat(7,1fr);border-bottom:1px solid #e4e0d8;background:#1e1e1e}
.week-duty-cell{padding:4px 3px;font-size:9px;border-left:1px solid #333;min-height:28px}
.week-duty-cell:first-child{display:flex;align-items:center;justify-content:flex-end;padding-right:5px;font-size:9px;color:#666;border-left:none}
.week-duty-chip{display:inline-block;padding:1px 6px;border-radius:999px;color:#fff;font-size:9px;font-weight:600;margin:1px;white-space:nowrap}
.week-scroll{overflow-y:auto;max-height:420px}
.week-body{display:grid;grid-template-columns:48px repeat(7,1fr)}
.hlabel{font-size:9px;color:#c0bbb4;padding:0 4px;height:46px;display:flex;align-items:flex-start;padding-top:4px;justify-content:flex-end;border-bottom:1px solid #f0ede8}
.wcol{border-left:1px solid #f0ede8;position:relative;height:46px;border-bottom:1px solid #f0ede8}
.we{position:absolute;left:1px;right:1px;border-radius:3px;padding:2px 4px;font-size:9px;font-weight:600;overflow:hidden;color:#fff;z-index:2;cursor:pointer;line-height:1.3}

/* ── Half year ── */
.half-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:640px){.half-grid{grid-template-columns:repeat(2,1fr)}}
.mmt{font-size:12px;font-weight:600;color:#888;margin-bottom:6px;text-align:center}
.mini-cal{width:100%;border-collapse:collapse}
.mini-cal th{font-size:9px;color:#c0bbb4;text-align:center;padding:1px}
.mini-cal td{text-align:center;padding:2px 1px;font-size:10px;color:#888;cursor:pointer;border-radius:3px}
.mini-cal td:hover{background:#f0ede8}
.mini-cal td.hc{font-weight:600;color:#2a2a2a}
.mini-cal td.tc{background:#2a2a2a;color:#fff;border-radius:50%}
.dot-row{display:flex;justify-content:center;gap:2px;margin-top:1px}
.dot{width:3px;height:3px;border-radius:50%}

/* ── Modal ── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:440px;max-width:96vw;max-height:92vh;overflow-y:auto;border:1px solid #e4e0d8}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem}
.modal-title{font-size:16px;font-weight:600;color:#2a2a2a}
.xbtn{width:28px;height:28px;border:none;background:none;font-size:18px;color:#aaa;border-radius:6px;display:flex;align-items:center;justify-content:center}
.xbtn:hover{background:#f0ede8}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lt-group{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.lt-btn{padding:5px 12px;font-size:11px;border-radius:999px;border:1px solid #d4d0c8;background:#fff;color:#666}
.lt-btn.active{background:#7BAE96;color:#fff;border-color:#7BAE96}
.room-opt{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #e4e0d8;border-radius:8px;cursor:pointer;font-size:12px;color:#2a2a2a}
.room-opt.sel{border-color:#7BAE96}
.room-opt input{accent-color:#7BAE96;width:auto}
.standby-info{background:#fff8e1;border:1px solid #ffc107;border-radius:8px;padding:8px 12px;font-size:11px;color:#7d5a00;margin-bottom:.7rem;display:none}
.warn-box{background:#FDECEA;border:1px solid #E53935;border-radius:8px;padding:8px 12px;font-size:11px;color:#7a1010;margin-bottom:.7rem;display:none}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:1.1rem}
.btn-c{padding:7px 14px;font-size:12px;border-radius:8px;border:1px solid #d4d0c8;background:#fff;color:#666}
.btn-s{padding:7px 14px;font-size:12px;border-radius:8px;border:none;background:#7BAE96;color:#fff}
.btn-s:hover{background:#6a9d85}
.btn-d{padding:7px 14px;font-size:12px;border-radius:8px;border:none;background:#E53935;color:#fff;margin-right:auto}
.det-row{display:flex;align-items:flex-start;gap:9px;padding:7px 0;font-size:12px;color:#666;border-bottom:1px solid #f0ede8}
.det-row:last-child{border:none}
.stag{padding:3px 10px;background:#f0ede8;border-radius:999px;font-size:11px;color:#555}

/* ── 排值班 modal ── */
.duty-loc-section{margin-bottom:1rem}
.duty-loc-title{font-size:12px;font-weight:600;color:#555;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.duty-loc-icon{width:8px;height:8px;border-radius:50%}
.duty-coach-grid{display:flex;flex-wrap:wrap;gap:6px}
.duty-coach-btn{padding:6px 13px;font-size:12px;border-radius:999px;border:1.5px solid #d4d0c8;background:#fff;color:#555;cursor:pointer}
.duty-coach-btn.selected{color:#fff;border-color:transparent}

/* ── Settings ── */
.settings-page{display:none;flex-direction:column;flex:1}
.coach-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border:1px solid #e4e0d8;border-radius:10px;margin-bottom:8px}
.color-dot{width:30px;height:30px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid transparent}
.color-dot:hover{border-color:#2a2a2a}
.color-swatch-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:8px}
.csw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.csw:hover,.csw.picked{border-color:#2a2a2a}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2a2a2a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <img id="logo-login" alt="YM HOPE">
    <div class="login-sub">教練團隊排課行事曆</div>
    <div class="fr"><label>帳號（姓名）</label><input type="text" id="lu" placeholder="例：Kenny Tsai" autocomplete="username"></div>
    <div class="fr"><label>密碼</label><input type="password" id="lp" placeholder="請輸入密碼" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="err" id="lerr">帳號或密碼錯誤，請重試</div>
    <button class="btn-primary" onclick="doLogin()">登入</button>
  </div>
  <div class="demo-row">
    <button class="demo-btn" style="width:100%;font-size:13px;color:#7BAE96;border-color:#7BAE96" onclick="previewMode()">👁 純預覽（不需登入）</button>
  </div>
</div>

<!-- ══ APP ══ -->
<div class="app" id="app-screen">
  <div class="header">
    <div class="header-left">
      <img id="logo-header" alt="YM HOPE">
      <div class="header-divider"></div>
      <div class="header-sub">教練團隊排課行事曆</div>
      <span class="role-tag" id="role-tag"></span>
    </div>
    <div class="user-info">
      <span id="uname"></span>
      <button class="icon-btn" id="settings-btn" onclick="showSettings()" style="display:none">⚙ 設定</button>
      <button class="icon-btn" onclick="doLogout()">登出</button>
    </div>
  </div>

  <!-- Calendar main -->
  <div class="main" id="cal-main">
    <div class="toolbar">
      <div class="nav-row">
        <button class="nav-btn" onclick="navigate(-1)">‹</button>
        <span class="period-label" id="period-label"></span>
        <button class="nav-btn" onclick="navigate(1)">›</button>
        <button class="today-btn" onclick="goToday()">今天</button>
      </div>
      <div class="pill-group">
        <button class="pill active" onclick="switchView('day')">日</button>
        <button class="pill" onclick="switchView('week')">週</button>
        <button class="pill" onclick="switchView('month')">月</button>
        <button class="pill" onclick="switchView('half')">半年</button>
      </div>
    </div>
    <div class="toolbar" style="margin-bottom:14px">
      <div class="filter-row" id="coach-filters"></div>
      <div style="display:flex;gap:7px">
        <button class="icon-btn" id="duty-btn" onclick="openDutyModal()" style="display:none;color:#7BAE96;border-color:#7BAE96">📋 排值班</button>
        <button class="icon-btn" id="leave-btn" onclick="openLeaveModal()" style="display:none;color:#7B9CC9;border-color:#7B9CC9">🏖 排休假</button>
        <button class="add-btn" id="add-btn" onclick="openAdd()" style="display:none">＋ 新增課程</button>
      </div>
    </div>
    <div id="duty-bar-wrap"></div>
    <div id="leave-bar-wrap"></div>
    <div id="cal-root"></div>
  </div>

  <!-- Settings -->
  <div class="settings-page main" id="settings-main">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:17px;font-weight:600">教練管理</div>
      <div style="display:flex;gap:8px">
        <button class="add-btn" onclick="addCoachRow()">＋ 新增教練</button>
        <button class="icon-btn" onclick="showCal()">← 返回行事曆</button>
      </div>
    </div>
    <div id="coach-list"></div>
  </div>
</div>

<!-- ══ 課程 Modal ══ -->
<div class="modal-backdrop" id="form-modal">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title" id="form-title">新增課程</div><button class="xbtn" onclick="closeForm()">✕</button></div>
    <div class="fr"><label style="font-size:12px;color:#666;display:block;margin-bottom:4px;font-weight:500">課程名稱</label><input type="text" id="f-name" placeholder="例：KT 教半"></div>
    <div class="g2" style="margin-bottom:.75rem">
      <div><label style="font-size:12px;color:#666;display:block;margin-bottom:4px;font-weight:500">教練</label><select id="f-coach"></select></div>
      <div>
        <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;font-weight:500">上課地點</label>
        <div class="lt-group">
          <button class="lt-btn active" onclick="setLT('room')">🏢 教室</button>
          <button class="lt-btn" onclick="setLT('field')">📍 外勤</button>
          <button class="lt-btn" onclick="setLT('none')">— 無</button>
        </div>
      </div>
    </div>
    <div id="room-picker" style="margin-bottom:.75rem">
      <label style="font-size:12px;color:#666;display:block;margin-bottom:6px;font-weight:500">選擇教室位置</label>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px" id="room-opts"></div>
    </div>
    <div id="field-picker" style="display:none;margin-bottom:.75rem">
      <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;font-weight:500">外勤地點名稱</label>
      <input type="text" id="f-loc" placeholder="例：大安森林公園球場">
    </div>
    <div class="standby-info" id="standby-info">⚠️ <span id="standby-msg"></span></div>
    <div class="g2">
      <div class="fr">
        <label style="font-size:12px;color:#666;display:block;margin-bottom:4px;font-weight:500">開始時間</label>
        <div style="display:flex;gap:5px">
          <input type="date" id="f-start-date" style="flex:1" onchange="syncDateTime();checkStandby()">
          <select id="f-start-time" style="width:90px;flex-shrink:0" onchange="syncDateTime();checkStandby()"></select>

// 樓層群組：同樓層同時段只能有一堂課
const ROOM_FLOOR  = {
  '2f-front':'2f','2f-back':'2f',
  'b1-front':'b1','b1-back':'b1',
  'pg-front':'pg','pg-back':'pg',
};

const ROOM_LABEL  = {
  '2f-front':'2樓前半','2f-back':'2樓後半',
  'b1-front':'樓下前半','b1-back':'樓下後半',
  'pg-front':'推桿前半','pg-back':'推桿後半',
};
const FLOOR_LABEL = {
  '2f-front':'2樓前半','2f-back':'2樓後半',
  'b1-front':'樓下前半','b1-back':'樓下後半',
  'pg-front':'推桿前半','pg-back':'推桿後半',
};

// 計算課程在同時段、同教室的登記順序（用全域 seq 判斷先後）
function getSameSlotRank(cls, allClasses) {
  if (cls.locType !== 'room') return null;
  const same = allClasses
    .filter(o => o.locType==='room' && o.location===cls.location && cls.start < o.end && cls.end > o.start)
    .sort((a,b) => a.seq - b.seq);
  const idx = same.findIndex(o => String(o.id)===String(cls.id));
  return idx + 1; // 1-based
}

// 取得課程的教室實際佔用時間區間
// 前半 = 開始後30分鐘，後半 = 結束前30分鐘
function getRoomOccupyInterval(cls) {
  const isBack = cls.location && cls.location.endsWith('-back');
  const startStr = cls.start.replace(' ','T');
  const endStr   = cls.end.replace(' ','T');

  function addMin(dtStr, min) {
    const parts = dtStr.split('T');
    const [h, m] = parts[1].split(':').map(Number);
    const total = h * 60 + m + min;
    const nh = Math.floor(total / 60) % 24;
    const nm = total % 60;
    return `${parts[0]}T${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
  }

  if (isBack) {
    // 後半：結束前30分鐘
    return { occupyStart: addMin(endStr, -30), occupyEnd: endStr };
  } else {
    // 前半：開始後30分鐘
    return { occupyStart: startStr, occupyEnd: addMin(startStr, 30) };
  }
}

function getRoomStatus(cls, allClasses) {
  if (cls.locType !== 'room') return { isStandby:false, label: cls.location ? (ROOM_LABEL[cls.location]||cls.location) : '' };
  const loc = cls.location;
  if (!ROOM_LABEL[loc]) return { isStandby:false, label: loc };
  const floor = ROOM_FLOOR[loc];

  const { occupyStart: clsOS, occupyEnd: clsOE } = getRoomOccupyInterval(cls);

  // 同樓層、教室佔用時間重疊的課程
  const same = allClasses
    .filter(o => {
      if (o.locType !== 'room') return false;
      if (ROOM_FLOOR[o.location] !== floor) return false;
      const { occupyStart: oOS, occupyEnd: oOE } = getRoomOccupyInterval(o);
      return clsOS < oOE && clsOE > oOS;
    })
    .sort((a,b) => a.seq - b.seq);

  const idx = same.findIndex(o => String(o.id)===String(cls.id));
  if (idx === 0) return { isStandby:false, label: ROOM_LABEL[loc] };
  const n = idx;
  return { isStandby:true, standbyNum:n, label:`${ROOM_LABEL[loc]}候補${n}` };
}
function isStandby(c) { return c.locType==='room' && getRoomStatus(c, classes).isStandby; }

const isGuohua    = () => me && (me.role === 'admin' || me.role === 'admin_guohua');

const isCoach     = () => me && me.role === 'coach';

const dutyForDate   = ds => dutyData[ds] || { xueyuan:[], guohua:[] };
function mondayOf(d){ const day=d.getDay(); const r=new Date(d); r.setDate(d.getDate()+(day===0?-6:1-day)); return r; }
function filtered(){ return classes.filter(c=>coachFilter.has(String(c.coachId))); }

function locTagHTML(c) {
  if (c.locType==='none')  return '<span class="loc-tag loc-none">無地點</span>';
  if (c.locType==='field') return `<span class="loc-tag loc-field">📍 ${c.location||'外勤'}</span>`;
  const st = getRoomStatus(c, classes);
  if (st.isStandby) return `<span class="loc-tag loc-standby">🏢 ${st.label}</span>`;
  const floor = ROOM_FLOOR[c.location];
  const locCls = floor==='2f' ? 'loc-2f' : floor==='b1' ? 'loc-b1' : 'loc-pg';
  return `<span class="loc-tag ${locCls}">🏢 ${st.label}</span>`;
}

// ── API 呼叫（用 GET + query string，避免 CORS preflight）──────
async function apiCall(params, timeoutMs=10000) {
  const qs = Object.entries(params)
    .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(typeof v==='object'?JSON.stringify(v):v)}`)
    .join('&');
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(`${API_URL}?${qs}`, { signal: controller.signal });
    clearTimeout(timer);
    return res.json();
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('連線逾時，請稍後再試');
    throw e;
  }
}

async function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  if (!u || !p) return;
  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = '登入中...';
  try {
    const data = await apiCall({ action:'login', username:u, password:p });
    if (data.success) {
      await loadCoaches();
      loginAs({ ...data.coach, role: data.coach.role });
    } else {
      document.getElementById('lerr').textContent = data.error || '帳號或密碼錯誤';
      document.getElementById('lerr').style.display = 'block';
    }
  } catch (e) {
    console.error(e);
    document.getElementById('lerr').textContent = '連線失敗，請確認網路或稍後再試';
    document.getElementById('lerr').style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = '登入';
  }
}

async function loadCoaches() {
  try {
    const data = await apiCall({ action:'getCoaches' });
    if (data.coaches && data.coaches.length) {
      coaches = data.coaches.map(c => ({
        id: Number(c.id), name: c.name, abbr: c.abbr,
        color: c.color || '#7BAE96', active: true
      }));
    }
  } catch (e) { console.warn('loadCoaches failed', e); }
}

async function loadClasses() {
  try {
    const data = await apiCall({ action:'getClasses' });
    if (data.classes) {
      classes = data.classes.map(c => ({ ...c, coachId: Number(c.coachId), seq: Number(c.seq) }));
      nextSeq = classes.reduce((m, c) => Math.max(m, c.seq), 0);
      render();
    }
  } catch (e) { console.warn('loadClasses failed', e); }
}

function renderFilters() {
  const el = document.getElementById('coach-filters'); el.innerHTML='';

function renderLabel() {
  const el=document.getElementById('period-label');

  if (!dc.length) { root.innerHTML='<div class="empty-state">📭<br>今天沒有課程</div>'; return; }

    const co=getCoach(c.coachId), isMine=me&&String(c.coachId)===String(me.id), sb=isStandby(c);
    const ls = sb ? 'border-left:15px solid #E53935' : isMine ? `border-left:15px solid ${co.color}` : 'border-left:3px solid #e4e0d8';
    html += `<div class="day-card${sb?' standby':''}" style="${ls}" onclick="showDet('${c.id}')">
      <div class="avatar" style="background:${co.color}">${co.abbr}</div>

        <div class="card-title">${c.name}</div>

      </div>
      <div class="time-col">${c.start.replace(' ','T').split('T')[1]?.slice(0,5)||''} – ${c.end.replace(' ','T').split('T')[1]?.slice(0,5)||''}</div>

}

// ════════════════════════════════════════════
//  週檢視
// ════════════════════════════════════════════
function renderWeek(root) {
  const mon=mondayOf(curDate), today=new Date();
  const HOURS=Array.from({length:19},(_,i)=>i+6), SLOT=46; // 6:00~24:00
  let html='<div class="week-wrap"><div class="week-head-row"><div class="whc" style="border-right:1px solid #e4e0d8"></div>';
  for(let d=0;d<7;d++){const day=new Date(mon);day.setDate(mon.getDate()+d);const isTd=day.toDateString()===today.toDateString();html+=`<div class="whc"><div class="wdn">${DTW[day.getDay()]}</div><div class="wdd${isTd?' tw':''}">${day.getDate()}</div></div>`;}
  html+='</div><div class="week-duty-row"><div class="week-duty-cell" style="color:#666">值班</div>';
  for(let d=0;d<7;d++){const day=new Date(mon);day.setDate(mon.getDate()+d);const duty=dutyForDate(fmtDate(day));let chips='';
    duty.xueyuan.forEach(id=>{const co=getCoach(id);chips+=`<span class="week-duty-chip" style="background:${co.color}">${co.abbr}學</span>`;});
    duty.guohua.forEach(id=>{const co=getCoach(id);chips+=`<span class="week-duty-chip" style="background:${co.color};opacity:.75">${co.abbr}國</span>`;});
    html+=`<div class="week-duty-cell">${chips}</div>`;}
  html+='</div>';
  // 休假列
  html+='<div class="week-duty-row" style="background:#C8DCF0"><div class="week-duty-cell" style="color:#5a7a9a">休假</div>';
  for(let d=0;d<7;d++){const day=new Date(mon);day.setDate(mon.getDate()+d);const ids=leaveData[fmtDate(day)]||[];let chips='';
    ids.forEach(id=>{const co=getCoach(id);chips+=`<span class="week-duty-chip" style="background:${co.color}">${co.abbr}</span>`;});
    html+=`<div class="week-duty-cell" style="border-left:1px solid #b0cce0">${chips}</div>`;}
  html+='</div>';
  html+='<div class="week-scroll" id="week-scroll-el"><div class="week-body" id="wbg">';
  HOURS.forEach(h=>{html+=`<div class="hlabel">${h}:00</div>`;for(let d=0;d<7;d++) html+=`<div class="wcol" data-d="${d}" data-h="${h}"></div>`;});
  html+='</div></div></div>'; root.innerHTML=html;
  // 自動捲到 9:00 位置
  const scrollEl=document.getElementById('week-scroll-el');
  if(scrollEl) scrollEl.scrollTop=(9-6)*SLOT;
  const wbg=document.getElementById('wbg');
  filtered().forEach(c=>{
    // 解析時間，支援 "2026-05-14T14:00" 和 "2026-05-14 14:00" 兩種格式
    const startStr = c.start.replace(' ','T');
    const endStr   = c.end.replace(' ','T');
    const startParts = startStr.split('T');
    const endParts   = endStr.split('T');
    if(startParts.length < 2 || endParts.length < 2) return;

    const day=new Date(startParts[0]), diff=Math.round((day-mon)/86400000);
    if(diff<0||diff>6) return;

    const [shStr,smStr] = startParts[1].split(':');
    const [ehStr,emStr] = endParts[1].split(':');
    const sh=parseInt(shStr)||0, sm=parseInt(smStr)||0;
    const eh=parseInt(ehStr)||0, em=parseInt(emStr)||0;

    // top 只計算分鐘偏移（課程放在對應小時的格子裡）
    const top=sm*(SLOT/60); // 分鐘偏移（已放在對應小時格子裡）
    const height=Math.max(((eh-sh)*60+(em-sm))*(SLOT/60),22);
    const co=getCoach(c.coachId), sb=isStandby(c);
    const cols=wbg.querySelectorAll(`.wcol[data-d="${diff}"]`);
    const idx=sh-6; if(idx<0||idx>=HOURS.length) return;
    // 計算同一格有幾堂課，做並排顯示
    const siblings = cols[idx].querySelectorAll('.we').length;
    const w = siblings === 0 ? '100%' : '50%';
    const left = siblings === 0 ? '1px' : '50%';
    const ev=document.createElement('div'); ev.className='we';
    ev.style.cssText=`background:${sb?'#E53935':co.color};top:${top}px;height:${height}px;width:${w};left:${left};right:auto`;
    // 已有的課程也縮成一半
    if(siblings===1){
      const prev=cols[idx].querySelector('.we');
      if(prev){ prev.style.width='50%'; prev.style.right='auto'; }
    }
    ev.textContent=c.name; ev.onclick=()=>showDet(c.id);
    cols[idx].appendChild(ev);
  });
}

// ════════════════════════════════════════════
//  月檢視
// ════════════════════════════════════════════
function renderMonth(root) {
  const y=curDate.getFullYear(), m=curDate.getMonth();
  const dim=new Date(y,m+1,0).getDate(), fd=new Date(y,m,1).getDay(), today=new Date();
  let html='<div class="month-grid">'; DTW.forEach(d=>html+=`<div class="mh">${d}</div>`);
  const total=Math.ceil((fd+dim)/7)*7;
  for(let i=0;i<total;i++){
    const col=i-fd+1, cur=col>=1&&col<=dim;
    const dStr=cur?`${y}-${pad(m+1)}-${pad(col)}`:'';
    const dc=dStr?filtered().filter(c=>c.start.replace(' ','T').slice(0,10)===dStr):[];
    const duty=dStr?dutyForDate(dStr):{xueyuan:[],guohua:[]};
    const isTd=cur&&today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===col;
    html+=`<div class="mc${cur?'':' om'}">`;
    if(cur){
      html+=isTd?`<div class="dn tod">${col}</div>`:`<div class="dn">${col}</div>`;
      if(duty.xueyuan.length||duty.guohua.length){html+='<div class="m-duty-row">';duty.xueyuan.forEach(id=>{const co=getCoach(id);html+=`<span class="m-duty-dot" style="background:${co.color}"></span>`;});duty.guohua.forEach(id=>{const co=getCoach(id);html+=`<span class="m-duty-dot" style="background:${co.color};opacity:.5;outline:1px solid ${co.color}"></span>`;});html+='</div>';}
      dc.slice(0,2).forEach(c=>{html+=`<div class="mpill" style="background:${isStandby(c)?'#E53935':getCoach(c.coachId).color}" onclick="showDet('${c.id}')">${c.name}</div>`;});
      if(dc.length>2) html+=`<div class="mmore">+${dc.length-2} 堂</div>`;
    }
    html+='</div>';
  }
  html+='</div>'; root.innerHTML=html;
}

// ════════════════════════════════════════════
//  半年檢視
// ════════════════════════════════════════════
function renderHalf(root) {
  const y=curDate.getFullYear(), sm=curDate.getMonth(), today=new Date();
  let html='<div class="half-grid">';
  for(let mi=0;mi<6;mi++){
    const mY=sm+mi>=12?y+1:y, mM=(sm+mi)%12;
    const dim=new Date(mY,mM+1,0).getDate(), fd=new Date(mY,mM,1).getDay();
    html+=`<div><div class="mmt">${mY} ${MTW[mM]}</div><table class="mini-cal"><thead><tr>`;
    DTW.forEach(d=>html+=`<th>${d}</th>`); html+='</tr></thead><tbody><tr>';
    for(let i=0;i<fd;i++) html+='<td></td>';
    let dow=fd;
    for(let day=1;day<=dim;day++){
      const dStr=`${mY}-${pad(mM+1)}-${pad(day)}`;
      const dc=filtered().filter(c=>c.start.replace(' ','T').slice(0,10)===dStr);
      const duty=dutyForDate(dStr), hasDuty=duty.xueyuan.length||duty.guohua.length;
      const isTd=today.getFullYear()===mY&&today.getMonth()===mM&&today.getDate()===day;
      const dots=dc.slice(0,2).map(c=>`<span class="dot" style="background:${isStandby(c)?'#E53935':getCoach(c.coachId).color}"></span>`).join('');
      const dutyDot=hasDuty?'<span class="dot" style="background:#7BAE96;opacity:.7"></span>':'';
      html+=`<td class="${dc.length||hasDuty?'hc':''}${isTd?' tc':''}" onclick="jumpDay(${mY},${mM},${day})">${day}${(dots||dutyDot)?`<div class="dot-row">${dots}${dutyDot}</div>`:''}</td>`;
      dow++; if(dow===7&&day<dim){html+='</tr><tr>';dow=0;}
    }
    while(dow%7!==0){html+='<td></td>';dow++;} html+='</tr></tbody></table></div>';
  }
  html+='</div>'; root.innerHTML=html;
}

// ── 時間下拉選單（整點和30分）────────────────────────────────────
function buildTimeOptions() {
  const times = [];
  for (let h = 6; h <= 24; h++) {
    times.push(`${String(h).padStart(2,'0')}:00`);
    if (h < 24) times.push(`${String(h).padStart(2,'0')}:30`);
  }
  return times;
}

function initTimeSelects() {
  const times = buildTimeOptions();
  ['f-start-time','f-end-time'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = times.map(t => `<option value="${t}">${t}</option>`).join('');
  });
}

function syncDateTime() {
  const sd = document.getElementById('f-start-date').value;
  const st = document.getElementById('f-start-time').value;
  const ed = document.getElementById('f-end-date').value;
  const et = document.getElementById('f-end-time').value;
  if (sd && st) document.getElementById('f-start').value = `${sd}T${st}`;
  if (ed && et) document.getElementById('f-end').value   = `${ed}T${et}`;
}

function setTimeFromValue(val, dateId, timeId) {
  if (!val) return;
  // val 格式：2026-05-14T14:00
  const parts = val.split('T');
  if (parts.length === 2) {
    document.getElementById(dateId).value = parts[0];
    // 找最接近的整點或30分
    const [h, m] = parts[1].split(':').map(Number);
    const roundedM = m >= 15 && m < 45 ? '30' : '00';
    const roundedH = (m >= 45 ? h + 1 : h) % 24;
    const timeStr = `${String(roundedH).padStart(2,'0')}:${roundedM}`;
    const sel = document.getElementById(timeId);
    // 找最接近的選項
    const opt = [...sel.options].find(o => o.value === timeStr) || sel.options[0];
    sel.value = opt.value;
  }
}

    const c=classes.find(x=>String(x.id)===String(editId));
    if(c){
      setTimeFromValue(c.start,'f-start-date','f-start-time');
      setTimeFromValue(c.end,'f-end-date','f-end-time');
      syncDateTime();
    }
  } else {
    const now=new Date();
    const todayStr=fmtDate(now);
    // 預設開始時間：下一個整點或30分
    const h=now.getHours(), m=now.getMinutes();
    let nextH=h, nextM='00';
    if(m>=30){nextH=h+1; nextM='00';} else {nextM='30';}
    if(nextH>22) nextH=22;
    const startTime=`${String(nextH).padStart(2,'0')}:${nextM}`;
    document.getElementById('f-start-date').value=todayStr;
    document.getElementById('f-start-time').value=startTime;
    // 結束時間：開始+1小時
    let endH=nextH+1; if(endH>22) endH=22;
    const endTime=`${String(endH).padStart(2,'0')}:${nextM}`;
    document.getElementById('f-end-date').value=todayStr;
    document.getElementById('f-end-time').value=endTime;
    syncDateTime();
  }
  document.getElementById('warn-box').style.display='none';
  document.getElementById('standby-info').style.display='none';

function checkStandby() {
  const si=document.getElementById('standby-info');

async function saveClass() {
  const saveBtn = document.querySelector('#form-modal .btn-s');
  if (saveBtn.disabled) return;
  saveBtn.disabled = true; saveBtn.textContent = '儲存中...';
  const name=document.getElementById('f-name').value.trim();
  const coachId=parseInt(document.getElementById('f-coach').value);
  const start=document.getElementById('f-start').value, end=document.getElementById('f-end').value;
  const students=document.getElementById('f-students').value;
  let location='';
  if(curLT==='room') location=selRoom;
  if(curLT==='field') location=document.getElementById('f-loc').value.trim();
  if(!name||!start||!end){showToast('請填寫課程名稱及時間');return;}
  if(start>=end){showToast('結束時間必須晚於開始時間');return;}
  const warns=[];
  classes.forEach(o=>{ if(String(o.id)===String(editId)) return; if(start<o.end&&end>o.start&&String(o.coachId)===String(coachId)) warns.push(`${getCoach(coachId).name} 在此時段已有「${o.name}」`); });
  const wb=document.getElementById('warn-box');
  if(warns.length){wb.style.display='block';document.getElementById('warn-msg').textContent=warns.join('；');}
  else wb.style.display='none';
  // 編輯課程時給予新 seq，確保後來修改的排在後面
  const newSeq = editId ? Math.max(...classes.map(c=>c.seq), 0) + 1 : undefined;
  const cls = { id:editId||undefined, name, coachId, locType:curLT, location, start, end, students, ...(newSeq?{seq:newSeq}:{}) };
  const action = editId ? 'updateClass' : 'addClass';
  try {
    const data = await apiCall({ action, cls });
    if (data.success || data.id) {
      showToast(editId ? '課程已更新' : '課程已新增');
      closeForm(); closeDet();
      await loadClasses();
      // 批次重複排課
      const repeatOn = document.getElementById('class-repeat-on').checked;
      if(repeatOn && (data.success || data.id)){
        const startDate = document.getElementById('f-start-date').value;
        const dates = getRepeatDates(startDate, 'class-dow-group', 'class-repeat-until');
        if(dates && dates.length){
          let saved=0, skipped=0;
          const startTime = document.getElementById('f-start-time').value;
          const endTime   = document.getElementById('f-end-time').value;
          for(const date of dates){
            // 同教練同時段已有課程則跳過
            const newStart = `${date}T${startTime}`;
            const newEnd   = `${date}T${endTime}`;
            const conflict = classes.some(o=>String(o.coachId)===String(coachId)&&o.start===newStart);
            if(conflict){ skipped++; continue; }
            const repeatCls = { name, coachId, locType:curLT, location, start:newStart, end:newEnd, students };
            try {
              await apiCall({ action:'addClass', cls: repeatCls });
              saved++;
            } catch(e) {}
          }
          await loadClasses();
          showToast(`已新增 ${saved+1} 堂，跳過 ${skipped} 堂`);
        }
      }
    } else { showToast(data.error || '儲存失敗'); }
  } catch(e){ showToast('連線失敗，請稍後再試'); }
  finally { saveBtn.disabled = false; saveBtn.textContent = '儲存'; }
}
async function delClass() {
  if(!editId) return;
  if(!confirm('確定要刪除這堂課程嗎？')) return;
  try {
    const data = await apiCall({ action:'cancelClass', id: editId });
    if (data.success) {
      showToast('課程已刪除'); closeForm(); closeDet();
      await loadClasses();
    } else { showToast(data.error || '刪除失敗'); }
  } catch(e){ showToast('連線失敗，請稍後再試'); }
}

function onLeaveDateChange() {
  const ds = document.getElementById('leave-date-input').value;
  if (!ds) return;
  leaveEditDate = ds;
  document.getElementById('leave-date-label').textContent = ds;
  const existing = leaveData[ds] || [];
  leaveSelIds = new Set(existing.map(String));
  buildLeaveGrid();
}

function buildLeaveGrid() {
  const el = document.getElementById('leave-coach-grid'); el.innerHTML = '';
  // 管理員可選所有人；教練只能選自己
  const list = isAnyAdmin() ? activeCoaches() : activeCoaches().filter(c => c.id === me.id);
  list.forEach(c => {
    const btn = document.createElement('button');
    const sel = leaveSelIds.has(String(c.id));
    btn.className = 'duty-coach-btn' + (sel ? ' selected' : '');
    if (sel) btn.style.background = c.color;
    btn.textContent = `${c.abbr} ${c.name}`;
    btn.onclick = () => {
      if (leaveSelIds.has(String(c.id))) {
        leaveSelIds.delete(String(c.id)); btn.classList.remove('selected'); btn.style.background = '';
      } else {
        leaveSelIds.add(String(c.id)); btn.classList.add('selected'); btn.style.background = c.color;
      }
    };
    el.appendChild(btn);
  });
}

async function saveLeave() {
  if (!leaveEditDate) { showToast('請選擇日期'); return; }
  const coachIds = [...leaveSelIds].join(',');
  // 先儲存當天
  leaveData[leaveEditDate] = [...leaveSelIds].map(Number);
  closeLeaveModal(); render();
  try { await apiCall({ action:'saveLeave', date:leaveEditDate, coachIds }); } catch(e) {}

  // 批次重複
  const repeatOn = document.getElementById('leave-repeat-on').checked;
  if (!repeatOn) { showToast('休假已儲存並同步'); return; }
  const dates = getRepeatDates(leaveEditDate, 'leave-dow-group', 'leave-repeat-until');
  if (!dates) return;
  let saved=0, skipped=0;
  for(const date of dates){
    const existing = leaveData[date] || [];
    if(existing.length > 0){ skipped++; continue; } // 已有休假跳過
    leaveData[date] = [...leaveSelIds].map(Number);
    try { await apiCall({ action:'saveLeave', date, coachIds }); saved++; } catch(e) {}
  }
  render();
  showToast(`已儲存 ${saved+1} 天，跳過 ${skipped} 天（已排過）`);
}

function getRepeatDates(startDate, dowGroupId, untilId) {
  const dows = [...document.querySelectorAll(`#${dowGroupId} input[type=checkbox]:checked`)].map(el=>Number(el.value));
  const until = document.getElementById(untilId).value;
  if (!dows.length || !until) { showToast('請選擇重複星期和結束日期'); return null; }
  const dates = [];
  const cur = new Date(startDate); cur.setDate(cur.getDate()+1); // 從隔天開始
  const end = new Date(until);
  while (cur <= end) {
    if (dows.includes(cur.getDay())) dates.push(fmtDate(cur));
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}
function toggleDutyRepeat(){
  const on = document.getElementById('duty-repeat-on').checked;
  document.getElementById('duty-repeat-panel').style.display = on ? 'block' : 'none';
}

// 取得要批次排班的所有日期
function getDutyRepeatDates(startDate) {
  const repeatOn = document.getElementById('duty-repeat-on').checked;
  if (!repeatOn) return [startDate];

  const dows = [...document.querySelectorAll('#duty-repeat-panel input[type=checkbox]:checked')].map(el=>Number(el.value));
  const until = document.getElementById('duty-repeat-until').value;
  if (!dows.length || !until) { showToast('請選擇重複星期和結束日期'); return null; }

  const dates = [];
  const cur = new Date(startDate);
  const end = new Date(until);
  while (cur <= end) {
    if (dows.includes(cur.getDay())) {
      dates.push(fmtDate(cur));
    }
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

async function saveDuty(){
  if(!dutyEditDate){showToast('請選擇日期');return;}
  const dates = getDutyRepeatDates(dutyEditDate);
  if(!dates) return;

  closeDutyModal(); render();

  let saved=0, skipped=0;
  for(const date of dates){
    const existing = dutyData[date] || { xueyuan:[], guohua:[] };
    // 跳過已有資料的日期
    const xHasData = existing.xueyuan.length > 0;
    const gHasData = existing.guohua.length > 0;
    const xSkip = isXueyuan() && xHasData && date !== dutyEditDate;
    const gSkip = isGuohua()  && gHasData && date !== dutyEditDate;
    if(xSkip && gSkip){ skipped++; continue; }

    const xueyuan = (isXueyuan() && !xSkip) ? [...dutySelX].join(',') : existing.xueyuan.join(',');
    const guohua  = (isGuohua()  && !gSkip) ? [...dutySelG].join(',') : existing.guohua.join(',');

    // 更新本地
    dutyData[date]={
      xueyuan: (isXueyuan() && !xSkip) ? [...dutySelX].map(Number) : existing.xueyuan,
      guohua:  (isGuohua()  && !gSkip) ? [...dutySelG].map(Number) : existing.guohua,
    };
    try {
      await apiCall({ action:'saveDuty', date, xueyuan, guohua });
      saved++;
    } catch(e) { console.warn('saveDuty failed for', date, e); }
  }
  render();
  if(dates.length > 1) showToast(`已儲存 ${saved} 天，跳過 ${skipped} 天（已排過）`);
  else showToast('值班已儲存並同步');
}

// ════════════════════════════════════════════
//  教練管理（設定頁）
// ════════════════════════════════════════════
function showSettings(){ document.getElementById('cal-main').style.display='none'; document.getElementById('settings-main').style.display='flex'; renderCoachList(); }
function showCal(){ document.getElementById('settings-main').style.display='none'; document.getElementById('cal-main').style.display='block'; renderFilters(); render(); }
function renderCoachList(){
  const el=document.getElementById('coach-list'); el.innerHTML='';
  coaches.forEach(c=>{
    const row=document.createElement('div'); row.className='coach-row';
    row.innerHTML=`<div class="color-dot" style="background:${c.color}" title="點擊換色" onclick="openColorPick(${c.id})"></div>
      <input type="text" value="${c.abbr}" placeholder="縮寫" style="width:56px;flex-shrink:0;text-align:center;font-weight:600" onchange="updateCoach(${c.id},'abbr',this.value)">
      <input type="text" value="${c.name}" placeholder="教練姓名" style="flex:1" onchange="updateCoach(${c.id},'name',this.value)">
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:#888;flex-shrink:0;cursor:pointer">
        <input type="checkbox" ${c.active?'checked':''} onchange="updateCoach(${c.id},'active',this.checked)" style="width:auto;accent-color:#7BAE96"> 顯示
      </label>
      <button style="padding:4px 9px;font-size:11px;border-radius:6px;border:1px solid #e0ccc8;background:#fff;color:#E53935;flex-shrink:0" onclick="removeCoach(${c.id})">移除</button>`;
    el.appendChild(row);
  });
}
function updateCoach(id,key,val){ const c=coaches.find(x=>x.id===id); if(c) c[key]=val; }
function addCoachRow(){
  const used=coaches.map(c=>c.color);
  const fresh=MORANDI.find(h=>!used.includes(h))||MORANDI[coaches.length%MORANDI.length];
  const newC={id:nextCoachId++,name:'新教練',abbr:'N'+(coaches.length+1),color:fresh,active:true};
  coaches.push(newC); coachFilter.add(String(newC.id));
  renderCoachList(); showToast('已新增教練，請填寫姓名和縮寫');
}
function removeCoach(id){
  if(!confirm('確定移除此教練？相關課程不受影響。')) return;
  coaches=coaches.filter(c=>c.id!==id); coachFilter.delete(String(id));
  renderCoachList(); showToast('已移除');
}
function openColorPick(coachId){
  colorPickTarget=coachId; const co=coaches.find(c=>c.id===coachId);
  const el=document.getElementById('color-swatches'); el.innerHTML='';
  MORANDI.forEach(hex=>{
    const div=document.createElement('div'); div.className='csw'+(co&&co.color===hex?' picked':'');
    div.style.background=hex;
    div.onclick=()=>{ const t=coaches.find(c=>c.id===colorPickTarget); if(t){t.color=hex;renderCoachList();} el.querySelectorAll('.csw').forEach(s=>s.classList.remove('picked')); div.classList.add('picked'); };
    el.appendChild(div);
  });
  document.getElementById('color-modal').classList.add('open');
}
function closeColorModal(){ document.getElementById('color-modal').classList.remove('open'); }

// ════════════════════════════════════════════
//  Modal 背景點擊關閉
// ════════════════════════════════════════════
document.querySelectorAll('.modal-backdrop').forEach(el=>{
  el.addEventListener('click', e=>{ if(e.target===el) el.classList.remove('open'); });
});

// ════════════════════════════════════════════
//  Toast
// ════════════════════════════════════════════
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

// ── 自動重新整理（每 30 秒同步一次資料）──────────────────────────
let autoRefreshTimer = null;
function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(async () => {
    if (!me) return;
    try {
      // 從 Sheets 拉最新值班和課程，直接覆蓋本地資料
      const [dutyRes, classRes, leaveRes] = await Promise.all([
        apiCall({ action:'getDuty' }),
        apiCall({ action:'getClasses' }),
        apiCall({ action:'getLeave' })
      ]);
      if (dutyRes.duty) dutyData = dutyRes.duty;
      if (leaveRes.leave) leaveData = leaveRes.leave;
      if (classRes.classes) {
        classes = classRes.classes.map(c => ({ ...c, coachId: Number(c.coachId), seq: Number(c.seq) }));
        nextSeq = classes.reduce((m,c) => Math.max(m, c.seq), 0);
      }
      render();
    } catch(e) { console.warn('auto refresh failed', e); }
  }, 30000); // 每 30 秒
}
function stopAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = null;
}
</script>
